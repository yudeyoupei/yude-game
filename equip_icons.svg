<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
  <!-- 武器图标 -->
  <symbol id="icon-weapon" viewBox="0 0 40 40">
    <defs>
      <linearGradient id="weaponGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#c0c0c0"/>
        <stop offset="50%" style="stop-color:#e0e0e0"/>
        <stop offset="100%" style="stop-color:#808080"/>
      </linearGradient>
    </defs>
    <!-- 剑身 -->
    <polygon points="18,2 22,2 22,26 26,26 20,38 14,26 18,26" fill="url(#weaponGrad)" stroke="#666" stroke-width="0.5"/>
    <!-- 护手 -->
    <rect x="12" y="24" width="16" height="4" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <!-- 剑柄 -->
    <rect x="17" y="28" width="6" height="8" fill="#8B4513" stroke="#654321" stroke-width="0.5"/>
    <!-- 剑穗 -->
    <path d="M 20 36 Q 15 38 20 40 Q 25 38 20 36" fill="#e74c3c" opacity="0.8"/>
  </symbol>
  
  <!-- 头盔图标 -->
  <symbol id="icon-helmet" viewBox="0 0 40 40">
    <defs>
      <linearGradient id="helmetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#b0b0b0"/>
        <stop offset="50%" style="stop-color:#d0d0d0"/>
        <stop offset="100%" style="stop-color:#909090"/>
      </linearGradient>
    </defs>
    <!-- 头盔主体 -->
    <path d="M 8 15 Q 8 5 20 5 Q 32 5 32 15 L 32 25 Q 32 30 20 30 Q 8 30 8 25 Z" fill="url(#helmetGrad)" stroke="#666" stroke-width="0.5"/>
    <!-- 面罩开口 -->
    <path d="M 12 15 Q 12 8 20 8 Q 28 8 28 15" fill="none" stroke="#333" stroke-width="1"/>
    <!-- 装饰 -->
    <circle cx="20" cy="12" r="2" fill="#FFD700" opacity="0.7"/>
    <!-- 护耳 -->
    <ellipse cx="8" cy="20" rx="3" ry="5" fill="#a0a0a0"/>
    <ellipse cx="32" cy="20" rx="3" ry="5" fill="#a0a0a0"/>
  </symbol>
  
  <!-- 护甲图标 -->
  <symbol id="icon-armor" viewBox="0 0 40 40">
    <defs>
      <linearGradient id="armorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#a0a0a0"/>
        <stop offset="50%" style="stop-color:#c0c0c0"/>
        <stop offset="100%" style="stop-color:#808080"/>
      </linearGradient>
    </defs>
    <!-- 胸甲 -->
    <path d="M 10 5 L 30 5 L 32 15 L 35 30 L 25 35 L 20 32 L 15 35 L 5 30 L 8 15 Z" fill="url(#armorGrad)" stroke="#666" stroke-width="0.5"/>
    <!-- 肩甲 -->
    <ellipse cx="8" cy="12" rx="6" ry="8" fill="#b0b0b0" stroke="#666" stroke-width="0.5"/>
    <ellipse cx="32" cy="12" rx="6" ry="8" fill="#b0b0b0" stroke="#666" stroke-width="0.5"/>
    <!-- 装饰 -->
    <circle cx="20" cy="20" r="3" fill="#FFD700" opacity="0.6"/>
    <path d="M 15 25 L 25 25" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  </symbol>
  
  <!-- 鞋子图标 -->
  <symbol id="icon-boots" viewBox="0 0 40 40">
    <defs>
      <linearGradient id="bootsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#8B4513"/>
        <stop offset="50%" style="stop-color:#A0522D"/>
        <stop offset="100%" style="stop-color:#654321"/>
      </linearGradient>
    </defs>
    <!-- 靴筒 -->
    <path d="M 12 5 L 28 5 L 30 20 L 25 25 L 15 25 L 10 20 Z" fill="url(#bootsGrad)" stroke="#333" stroke-width="0.5"/>
    <!-- 靴身 -->
    <path d="M 10 20 L 30 20 L 32 30 Q 32 35 20 35 Q 8 35 8 30 L 10 20" fill="#A0522D" stroke="#333" stroke-width="0.5"/>
    <!-- 装饰 -->
    <path d="M 15 10 L 25 10" stroke="#FFD700" stroke-width="1" opacity="0.6"/>
    <circle cx="20" cy="15" r="1.5" fill="#FFD700" opacity="0.7"/>
  </symbol>
  
  <!-- 饰品图标 -->
  <symbol id="icon-accessory" viewBox="0 0 40 40">
    <defs>
      <radialGradient id="accessoryGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" style="stop-color:#FFD700"/>
        <stop offset="50%" style="stop-color:#FFA500"/>
        <stop offset="100%" style="stop-color:#FFD700"/>
      </radialGradient>
    </defs>
    <!-- 宝石 -->
    <polygon points="20,5 28,15 25,28 15,28 12,15" fill="url(#accessoryGrad)" stroke="#B8860B" stroke-width="0.5"/>
    <!-- 高光 -->
    <polygon points="20,8 24,15 22,24 18,24 16,15" fill="#fff" opacity="0.3"/>
    <!-- 底座 -->
    <rect x="14" y="28" width="12" height="4" fill="#c0c0c0" stroke="#666" stroke-width="0.5"/>
    <!-- 光芒 -->
    <g opacity="0.5">
      <line x1="20" y1="2" x2="20" y2="0" stroke="#FFD700" stroke-width="1"/>
      <line x1="35" y1="20" x2="38" y2="20" stroke="#FFD700" stroke-width="1"/>
      <line x1="20" y1="38" x2="20" y2="40" stroke="#FFD700" stroke-width="1"/>
      <line x1="5" y1="20" x2="2" y2="20" stroke="#FFD700" stroke-width="1"/>
    </g>
  </symbol>
  
  <!-- 盾牌图标 -->
  <symbol id="icon-shield" viewBox="0 0 40 40">
    <defs>
      <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#4A90E2"/>
        <stop offset="100%" style="stop-color:#357ABD"/>
      </linearGradient>
    </defs>
    <!-- 盾牌主体 -->
    <path d="M 20 2 L 35 8 L 35 20 Q 35 32 20 38 Q 5 32 5 20 L 5 8 Z" fill="url(#shieldGrad)" stroke="#2C5F8A" stroke-width="0.5"/>
    <!-- 装饰 -->
    <circle cx="20" cy="20" r="8" fill="none" stroke="#fff" stroke-width="1" opacity="0.6"/>
    <circle cx="20" cy="20" r="4" fill="#fff" opacity="0.4"/>
  </symbol>
</svg>
